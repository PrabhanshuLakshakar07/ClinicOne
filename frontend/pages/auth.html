<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Sehat — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🏥</div>
      <h1>E-<span>Sehat</span></h1>
      <p>Clinic Management System</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login"    onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab"        data-tab="register" onclick="switchAuthTab('register')">Register</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="auth-panel active" id="login-panel">
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label-auth">Email Address</label>
          <input type="email" id="login-email" class="form-control-auth"
                 placeholder="doctor@esehat.pk" value="doctor@esehat.pk">
        </div>
        <div class="mb-4">
          <label class="form-label-auth">Password</label>
          <input type="password" id="login-pass" class="form-control-auth"
                 placeholder="••••••••" value="clinic123">
        </div>
        <button type="submit" id="login-btn" class="btn-auth">🔐 &nbsp; Sign In to Dashboard</button>
      </form>
      <div class="auth-demo-hint mt-3">
        Demo: <code>doctor@esehat.pk</code> / <code>clinic123</code>
      </div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="auth-panel" id="register-panel">
      <form id="register-form" onsubmit="doRegister(event)">
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label-auth">First Name</label>
            <input type="text" id="reg-fname" class="form-control-auth" placeholder="Ahmad">
          </div>
          <div class="col-6">
            <label class="form-label-auth">Last Name</label>
            <input type="text" id="reg-lname" class="form-control-auth" placeholder="Khan">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label-auth">Email Address</label>
          <input type="email" id="reg-email" class="form-control-auth" placeholder="doctor@clinic.pk">
        </div>
        <div class="mb-3">
          <label class="form-label-auth">Clinic Name</label>
          <input type="text" id="reg-clinic" class="form-control-auth" placeholder="Al-Shifa Clinic">
        </div>
        <div class="mb-4">
          <label class="form-label-auth">Password</label>
          <input type="password" id="reg-pass" class="form-control-auth" placeholder="Min 6 characters">
        </div>
        <button type="submit" id="register-btn" class="btn-auth">✅ &nbsp; Create Account</button>
      </form>
    </div>

  </div>
</div>

<div class="toast-container-custom" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
